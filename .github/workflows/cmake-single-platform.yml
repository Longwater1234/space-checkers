# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake on a single platform

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  GAME_VERSION: "1.0.15"
  SFML_DIR: "C:/SFML/SFML-2.6.2"
  SFML_WIN_ZIP: SFML-2.6.2-windows-vc17-64-bit.zip

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download and setup SFML for Windows
        shell: cmd
        run: |
          mkdir "C:/SFML" && curl -fsSL "https://github.com/SFML/SFML/releases/download/2.6.2/${{ env.SFML_WIN_ZIP }}" -o "C:/SFML/${{ env.SFML_WIN_ZIP }}"
          tar -xvf "C:/SFML/${{env.SFML_WIN_ZIP}}" -C "C:/SFML/"

      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DENABLE_GAME_TESTS=ON -DSFML_DIR=${{env.SFML_DIR}} -DCMAKE_CXX_COMPILER=cl -DCMAKE_C_COMPILER=cl

      - name: Build
        # Build your program with the given configuration
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/build
        # Execute tests defined by the CMake configuration.
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        run: ctest -C ${{env.BUILD_TYPE}}
  
      - name: Generate build info
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyy-MM-ddTHH:mm:ss"
          $commit = "${{ github.sha }}"
          $branch = "${{ github.ref_name }}"
          $run = "${{ github.run_number }}"
          $appversion = "${{ env.GAME_VERSION }}"

          @"
          Build Date:   $date
          Commit:       $commit
          Branch:       $branch
          Game Version: $appversion
          "@ | Out-File -FilePath "${{github.workspace}}/build/bin/Release/build_info.txt"

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: space-checkers-${{ env.GAME_VERSION }}-${{ runner.os }}
          path: |
            ${{github.workspace}}/build/bin/Release/SpaceCheckers.exe
            ${{github.workspace}}/build/bin/Release/resources/
            ${{github.workspace}}/build/bin/Release/build_info.txt

            
